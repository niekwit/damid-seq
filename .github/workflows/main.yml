name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  Formatting:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Formatting
        uses: super-linter/super-linter@v8.3.1
        env:
          VALIDATE_ALL_CODEBASE: false
          DEFAULT_BRANCH: main
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VALIDATE_SNAKEMAKE_SNAKEFMT: true

  Linting:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - name: Lint workflow
        uses: snakemake/snakemake-github-action@v2
        with:
          directory: .test_se
          snakefile: workflow/Snakefile
          args: "--lint"

  Testing:
    runs-on: ubuntu-latest
    needs:
      - Linting
      - Formatting
    steps:
      - uses: actions/checkout@v2

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/share/boost
          df -h

      - name: Cache conda environments
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.conda
          key: conda-${{ hashFiles('workflow/envs/*.yaml') }}
          restore-keys: conda-

      - name: Test workflow SE
        uses: snakemake/snakemake-github-action@v2
        with:
          directory: .test_se
          snakefile: workflow/Snakefile
          snakemake-version: "8.25.5"
          args: >-
            --sdm conda --show-failed-logs --cores 2
            --conda-cleanup-pkgs cache
            --conda-prefix ${{ github.workspace }}/.conda

      - name: Test report SE
        uses: snakemake/snakemake-github-action@v2
        with:
          directory: .test_se
          snakefile: workflow/Snakefile
          snakemake-version: "8.25.5"
          args: >-
            --sdm conda --show-failed-logs --cores 2
            --conda-cleanup-pkgs cache
            --conda-prefix ${{ github.workspace }}/.conda
            --report report.zip

      - name: Test workflow PE
        uses: snakemake/snakemake-github-action@v2
        env:
          GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
        with:
          directory: .test_pe
          snakefile: workflow/Snakefile
          snakemake-version: "8.25.5"
          args: >-
            --sdm conda --show-failed-logs --cores 2
            --conda-cleanup-pkgs cache
            --conda-prefix ${{ github.workspace }}/.conda

      - name: Test report PE
        uses: snakemake/snakemake-github-action@v2
        with:
          directory: .test_pe
          snakefile: workflow/Snakefile
          snakemake-version: "8.25.5"
          args: >-
            --sdm conda --show-failed-logs --cores 2
            --conda-cleanup-pkgs cache
            --conda-prefix ${{ github.workspace }}/.conda
            --report report.zip
